server {
    listen 80;
    server_name thewisemonkey.co.uk www.thewisemonkey.co.uk;
    root /usr/share/nginx/html;
    index index.html index.htm;

    # === Agent-readiness ===
    # Detect Accept: text/markdown for content negotiation.
    set $accepts_markdown 0;
    if ($http_accept ~* "text/markdown") {
        set $accepts_markdown 1;
    }

    # Homepage: serve markdown alternate to agents that ask for it,
    # and advertise discovery endpoints via Link header to browsers.
    location = / {
        if ($accepts_markdown = 1) {
            rewrite ^ /index.md last;
        }
        add_header Link '</.well-known/api-catalog>; rel="api-catalog", </.well-known/agent-skills/index.json>; rel="agent-skills-index", </llms.txt>; rel="alternate"; type="text/markdown"' always;
        try_files /index.html =404;
    }

    location = /privacy-policy {
        if ($accepts_markdown = 1) {
            rewrite ^ /privacy-policy.md last;
        }
        try_files /index.html =404;
    }

    # Extensionless well-known endpoints → backing JSON file
    location = /.well-known/api-catalog {
        rewrite ^ /.well-known/api-catalog.json last;
    }

    # Short cache for robots.txt and sitemap so policy updates propagate fast
    # through Cloudflare's edge (otherwise they get stuck for hours).
    location = /robots.txt {
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
        try_files $uri =404;
    }
    location = /sitemap.xml {
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
        try_files $uri =404;
    }

    # Content-Type overrides for markdown / linkset+json artifacts.
    # Same short cache so we can iterate on agent metadata without waiting on CF.
    location = /llms.txt {
        types { } default_type "text/markdown; charset=utf-8";
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
        try_files $uri =404;
    }
    location = /llms-full.txt {
        types { } default_type "text/markdown; charset=utf-8";
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
        try_files $uri =404;
    }
    location = /index.md {
        types { } default_type "text/markdown; charset=utf-8";
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
        try_files $uri =404;
    }
    location = /privacy-policy.md {
        types { } default_type "text/markdown; charset=utf-8";
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
        try_files $uri =404;
    }
    location = /.well-known/api-catalog.json {
        types { } default_type "application/linkset+json; charset=utf-8";
        add_header Access-Control-Allow-Origin * always;
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
        try_files $uri =404;
    }
    location = /.well-known/agent-skills/index.json {
        types { } default_type "application/json; charset=utf-8";
        add_header Access-Control-Allow-Origin * always;
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
        try_files $uri =404;
    }
    location ~ "^/\.well-known/agent-skills/.+/SKILL\.md$" {
        types { } default_type "text/markdown; charset=utf-8";
        add_header Access-Control-Allow-Origin * always;
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
        try_files $uri =404;
    }

    # Reverse proxy for the /blog path (kept from previous config; useful
    # if we ever decide to serve the blog under the apex domain instead of
    # the blog.* subdomain).
    location /blog/ {
        resolver 8.8.8.8;
        proxy_pass https://blog.thewisemonkey.co.uk/;
        proxy_ssl_server_name on;
        proxy_set_header Host blog.thewisemonkey.co.uk;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept-Encoding "";

        sub_filter 'href="/'  'href="/blog/';
        sub_filter 'src="/'   'src="/blog/';
        sub_filter_once off;
    }

    # Default static + SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Handle server errors
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        internal;
    }
}
